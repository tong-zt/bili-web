services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./frontend:/app/frontend:ro
      - ./downloads:/data/downloads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
